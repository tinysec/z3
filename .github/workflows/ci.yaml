name: CI

# Single consolidated pipeline for this library-only fork.
#
# Stages:
#   1. version       - compute the version strings once.
#   2. build-windows - z3.dll / z3.lib for x64 and x86 (static CRT, no VC++ redistributable).
#   3. build-linux   - libz3.so / libz3.a for x64 and x86 (static libstdc++/libgcc).
#   4. release       - publish an immutable release on the 4-part tag
#                      vMAJOR.MINOR.PATCH.<build> and force-move the 3-part alias
#                      tag vMAJOR.MINOR.PATCH to the same commit.
#
# The semantic version is fixed below; only the build number changes per run.

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_MAJOR: "4"
  VERSION_MINOR: "16"
  VERSION_PATCH: "0"

jobs:
  # 1. Compute the version strings once and share them with downstream jobs.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      alias: ${{ steps.compute.outputs.alias }}
    steps:
      - name: Compute version strings
        id: compute
        run: |
          ALIAS="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          VERSION="${ALIAS}.${GITHUB_RUN_NUMBER}"
          echo "alias=${ALIAS}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Alias tag:     ${ALIAS}"
          echo "Versioned tag: ${VERSION}"

  # 2. Windows libraries: z3.dll (shared) and z3.lib (static). Each variant is
  # its own job so they build in parallel.
  #
  # The shared DLL is built with the static CRT (/MT) only: it is self-contained
  # (no VC++ redistributable) and the CRT is isolated behind the DLL boundary, so
  # one /MT DLL works for any consumer.
  #
  # The static library is shipped in BOTH /MT and /MD because a static library's
  # CRT must match the consumer's: /MT for consumers that statically link the CRT
  # (no VC++ redistributable, e.g. Rust +crt-static), /MD for the usual dynamic
  # CRT. Shipping only one would force the other half of consumers to rebuild.
  #
  # Pinned to windows-2022 because the "Visual Studio 17 2022" generator must be
  # present; windows-latest has moved to a newer image without VS 2022.
  build-windows:
    needs: version
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, cmake_platform: x64,   link: shared, shared: "ON",  runtime: MultiThreaded,    label: shared }
          - { arch: x86, cmake_platform: Win32, link: shared, shared: "ON",  runtime: MultiThreaded,    label: shared }
          - { arch: x64, cmake_platform: x64,   link: static, shared: "OFF", runtime: MultiThreaded,    label: static-mt }
          - { arch: x64, cmake_platform: x64,   link: static, shared: "OFF", runtime: MultiThreadedDLL, label: static-md }
          - { arch: x86, cmake_platform: Win32, link: static, shared: "OFF", runtime: MultiThreaded,    label: static-mt }
          - { arch: x86, cmake_platform: Win32, link: static, shared: "OFF", runtime: MultiThreadedDLL, label: static-md }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        # CMAKE_MSVC_RUNTIME_LIBRARY selects the CRT: MultiThreaded = /MT (no VC++
        # redistributable), MultiThreadedDLL = /MD (dynamic CRT).
        run: >
          cmake -B build -S . -G "Visual Studio 17 2022" -A ${{ matrix.cmake_platform }}
          -DZ3_BUILD_LIBZ3_SHARED=${{ matrix.shared }}
          -DCMAKE_MSVC_RUNTIME_LIBRARY=${{ matrix.runtime }}

      - name: Build
        run: cmake --build build --config Release --target libz3 --parallel

      - name: Package shared archive (z3.dll + PDB + import lib + headers)
        if: matrix.link == 'shared'
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $label = "${{ matrix.label }}"

          New-Item -ItemType Directory -Force pkg/bin, pkg/lib, pkg/include/c++ | Out-Null
          Copy-Item build/Release/z3.dll pkg/bin/
          Copy-Item build/Release/z3.pdb pkg/bin/
          Copy-Item build/Release/z3.lib pkg/lib/
          Copy-Item src/api/z3*.h pkg/include/
          Copy-Item src/api/c++/z3++.h pkg/include/c++/
          Copy-Item build/src/util/z3_version.h pkg/include/
          Compress-Archive -Path pkg/* -DestinationPath "z3-$version-windows-$arch-$label.zip"

      - name: Package static archive (z3.lib + headers)
        if: matrix.link == 'static'
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $label = "${{ matrix.label }}"

          New-Item -ItemType Directory -Force pkg/lib, pkg/include/c++ | Out-Null
          Copy-Item build/Release/z3.lib pkg/lib/
          Copy-Item src/api/z3*.h pkg/include/
          Copy-Item src/api/c++/z3++.h pkg/include/c++/
          Copy-Item build/src/util/z3_version.h pkg/include/
          Compress-Archive -Path pkg/* -DestinationPath "z3-$version-windows-$arch-$label.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: z3-windows-${{ matrix.arch }}-${{ matrix.label }}
          path: z3-*.zip

  # 3. Linux libraries: libz3.so (shared) and libz3.a (static).
  # Each (architecture, link type) is its own job so they build in parallel.
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, bits: "",     extra_packages: "",                          link: shared, shared: "ON"  }
          - { arch: x64, bits: "",     extra_packages: "",                          link: static, shared: "OFF" }
          - { arch: x86, bits: "-m32", extra_packages: "gcc-multilib g++-multilib", link: shared, shared: "ON"  }
          - { arch: x86, bits: "-m32", extra_packages: "gcc-multilib g++-multilib", link: static, shared: "OFF" }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install 32-bit toolchain
        if: matrix.extra_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Configure
        run: >
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          -DZ3_BUILD_LIBZ3_SHARED=${{ matrix.shared }}
          "-DCMAKE_C_FLAGS=${{ matrix.bits }}"
          "-DCMAKE_CXX_FLAGS=${{ matrix.bits }}"
          "-DCMAKE_SHARED_LINKER_FLAGS=-static-libstdc++ -static-libgcc ${{ matrix.bits }}"

      - name: Build
        # Explicit job count: a bare --parallel makes Make use unlimited jobs,
        # which exhausts the runner's memory and gets it killed (exit 143).
        run: cmake --build build --target libz3 --parallel "$(nproc)"

      - name: Package shared archive (libz3.so + headers)
        if: matrix.link == 'shared'
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          arch="${{ matrix.arch }}"

          mkdir -p pkg/lib pkg/include/c++
          cp -a build/libz3.so* pkg/lib/
          cp src/api/z3*.h pkg/include/
          cp src/api/c++/z3++.h pkg/include/c++/
          cp build/src/util/z3_version.h pkg/include/
          tar -czf "z3-${version}-linux-${arch}-shared.tar.gz" -C pkg .

      - name: Package static archive (libz3.a + headers)
        if: matrix.link == 'static'
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          arch="${{ matrix.arch }}"

          mkdir -p pkg/lib pkg/include/c++
          cp build/libz3.a pkg/lib/
          cp src/api/z3*.h pkg/include/
          cp src/api/c++/z3++.h pkg/include/c++/
          cp build/src/util/z3_version.h pkg/include/
          tar -czf "z3-${version}-linux-${arch}-static.tar.gz" -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: z3-linux-${{ matrix.arch }}-${{ matrix.link }}
          path: z3-*.tar.gz

  # 4. Publish the versioned release and re-point the alias tag.
  release:
    needs: [ version, build-windows, build-linux ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish versioned release and move alias tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          ALIAS: ${{ needs.version.outputs.alias }}
        run: |
          set -euo pipefail

          # 1. Immutable per-build release on the 4-part tag (also marked latest).
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes "Automated build of Z3 ${ALIAS#v} (build ${GITHUB_RUN_NUMBER}) for windows/linux x64 and x86. Windows libraries use the static CRT; Linux libraries statically link libstdc++/libgcc. No external runtime required." \
            --latest \
            $(find dist -type f | sort)

          # 2. Re-point the 3-part alias tag to this build's commit.
          git tag --force "${ALIAS}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${ALIAS}"
